    <rect x="0" y="0" width="170" height="330" rx="30" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/>
    <rect x="16" y="20" width="138" height="200" rx="16" fill="#4dd4a7" fill-opacity="0.18"/>
    <rect x="34" y="250" width="102" height="12" rx="6" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="34" y="276" width="70" height="12" rx="6" fill="#ffffff" fill-opacity="0.18"/>
  </g>
  <!-- front phone -->
  <g transform="translate(180 110) rotate(-6)">
    <rect x="0" y="0" width="190" height="360" rx="34" fill="#0f0f14" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="70" y="16" width="50" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="18" y="40" width="154" height="120" rx="18" fill="url(#ex-screen)"/>
    <circle cx="52" cy="100" r="20" fill="#ffffff" fill-opacity="0.85"/>
    <rect x="84" y="88" width="70" height="10" rx="5" fill="#ffffff" fill-opacity="0.85"/>
    <rect x="84" y="106" width="46" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="18" y="178" width="72" height="72" rx="16" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="100" y="178" width="72" height="72" rx="16" fill="#4dd4a7" fill-opacity="0.22"/>
    <rect x="18" y="264" width="154" height="14" rx="7" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="18" y="292" width="120" height="14" rx="7" fill="#ffffff" fill-opacity="0.14"/>
    <rect x="60" y="330" width="70" height="8" rx="4" fill="#ffffff" fill-opacity="0.3"/>
