<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Expo mobile apps">
  <defs>
    <linearGradient id="ex-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12131a"/>
      <stop offset="1" stop-color="#1c1310"/>
    </linearGradient>
    <radialGradient id="ex-glow" cx="0" cy="0" r="1" gradientTransform="translate(410 250) rotate(90) scale(260)">
      <stop stop-color="#ff6a2c" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ff6a2c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ex-screen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff6a2c"/>
      <stop offset="1" stop-color="#d9531e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ex-bg)"/>
  <rect width="800" height="500" fill="url(#ex-glow)"/>
  <g opacity="0.5" stroke="#ffffff" stroke-opacity="0.05">
    <path d="M0 130h800M0 370h800M270 0v500M530 0v500"/>
  </g>
  <!-- back phone -->
