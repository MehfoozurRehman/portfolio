<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-label="Desktop automation tools">
  <defs>
    <linearGradient id="de-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111319"/>
      <stop offset="1" stop-color="#1b1310"/>
    </linearGradient>
    <radialGradient id="de-glow" cx="0" cy="0" r="1" gradientTransform="translate(560 380) rotate(-120) scale(300)">
      <stop stop-color="#4dd4a7" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#4dd4a7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="de-accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ff6a2c"/>
      <stop offset="1" stop-color="#d9531e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#de-bg)"/>
  <rect width="800" height="500" fill="url(#de-glow)"/>
  <g opacity="0.5" stroke="#ffffff" stroke-opacity="0.05">
    <path d="M0 140h800M0 360h800M260 0v500M540 0v500"/>
  </g>
  <!-- window -->
  <g>
    <rect x="130" y="110" width="440" height="290" rx="20" fill="#0f0f14" stroke="#ffffff" stroke-opacity="0.16"/>
    <path d="M130 130 a20 20 0 0 1 20 -20 h400 a20 20 0 0 1 20 20 v22 h-440 z" fill="#ffffff" fill-opacity="0.05"/>
    <circle cx="160" cy="131" r="6" fill="#ff6a2c"/>
    <circle cx="182" cy="131" r="6" fill="#ffffff" fill-opacity="0.28"/>
    <circle cx="204" cy="131" r="6" fill="#4dd4a7"/>
    <!-- terminal lines -->
    <rect x="160" y="180" width="18" height="11" rx="3" fill="#4dd4a7"/>
    <rect x="188" y="180" width="200" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.4"/>
    <rect x="160" y="208" width="18" height="11" rx="3" fill="#ff6a2c"/>
    <rect x="188" y="208" width="150" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.28"/>
    <rect x="160" y="236" width="18" height="11" rx="3" fill="#4dd4a7"/>
    <rect x="188" y="236" width="240" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.22"/>
    <rect x="160" y="264" width="120" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.16"/>
    <!-- progress -->
    <rect x="160" y="320" width="360" height="14" rx="7" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="160" y="320" width="210" height="14" rx="7" fill="url(#de-accent)"/>
  </g>
  <!-- gear -->
  <g transform="translate(590 340)">
    <circle r="66" fill="#ff6a2c" fill-opacity="0.12"/>
    <g fill="#ff6a2c">
      <path d="M-8 -46 h16 l4 14 l13 5 l12 -8 l11 11 l-8 12 l5 13 l14 4 v16 l-14 4 l-5 13 l8 12 l-11 11 l-12 -8 l-13 5 l-4 14 h-16 l-4 -14 l-13 -5 l-12 8 l-11 -11 l8 -12 l-5 -13 l-14 -4 v-16 l14 -4 l5 -13 l-8 -12 l11 -11 l12 8 l13 -5 z"/>
    </g>
    <circle r="20" fill="#1b1210"/>
    <circle r="9" fill="#ff6a2c"/>
  </g>
  <text x="130" y="440" font-family="monospace" font-size="15" letter-spacing="3" fill="#ffffff" fill-opacity="0.3">ELECTRON · BACKGROUND · SYNC</text>
</svg>
