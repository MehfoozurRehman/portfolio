name: Deploy to Firebase Hosting on PR

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

concurrency:
  group: firebase-hosting-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build static site
        run: pnpm build

      - name: Install Firebase CLI
        run: pnpm dlx firebase-tools --version

      - name: Write Google Cloud credentials
        run: |
          mkdir -p "$HOME/.config/gcloud"
          printf '%s' '${{ secrets.GCP_SA_KEY_JSON }}' > "$HOME/.config/gcloud/application_default_credentials.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/.config/gcloud/application_default_credentials.json" >> "$GITHUB_ENV"

      - name: Deploy preview hosting and functions
        run: pnpm dlx firebase-tools deploy --only hosting:mehfooz-ur-rehman,functions --project mehfooz-ur-rehman
