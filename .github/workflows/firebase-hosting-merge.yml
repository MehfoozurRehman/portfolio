name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm build

      - name: Write Google Cloud credentials
        run: |
          mkdir -p "$HOME/.config/gcloud"
          printf '%s' '${{ secrets.GCP_SA_KEY_JSON }}' > "$HOME/.config/gcloud/application_default_credentials.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/.config/gcloud/application_default_credentials.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          set +e
          output="$(pnpm dlx firebase-tools deploy --only hosting --project mehfooz-ur-rehman 2>&1)"
          status=$?
          printf '%s\n' "$output"
          if [ $status -ne 0 ] && printf '%s' "$output" | grep -q "is the current active version"; then
            echo "Hosting deploy is already live; treating as success."
            exit 0
          fi
          exit $status
